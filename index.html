/* ===========================

.media-tile.dark{ color: var(--cream); }
.media-tile.dark .kicker{ color: var(--copper); opacity:1; }
.media-tile.light{ color: var(--black); }
.media-tile.light .kicker{ color: var(--burgundy); }

.media-tile .icon-tape{
  position:absolute; top:16px; right:16px; z-index:3;
  font-family: var(--mono); font-size: 9px; letter-spacing:.12em;
  border:1px solid currentColor; padding: 3px 6px; opacity: .65;
  text-transform:uppercase;
}

/* media grid placement */
.m-1{ grid-column: span 5; grid-row: span 2; }
.m-2{ grid-column: span 4; grid-row: span 2; }
.m-3{ grid-column: span 3; grid-row: span 1; }
.m-4{ grid-column: span 3; grid-row: span 1; }
.m-5{ grid-column: span 4; grid-row: span 1; }
.m-6{ grid-column: span 4; grid-row: span 1; }
.m-7{ grid-column: span 4; grid-row: span 1; }
@media (max-width: 880px){
  .media-grid{ grid-template-columns: repeat(2, 1fr); }
  .m-1,.m-2,.m-3,.m-4,.m-5,.m-6,.m-7{ grid-column: span 2; grid-row: span 1; }
  .m-1,.m-2{ grid-row: span 2; }
}

/* ---------- Palmarés (timeline) ---------- */
.palmares{ background: var(--cream); border-top: 1px solid var(--paper-line); }
.timeline{
  display:grid;
  grid-template-columns: 1fr 2fr;
  gap: clamp(40px, 6vw, 96px);
  align-items: start;
}
@media (max-width: 880px){ .timeline{ grid-template-columns: 1fr; } }
.timeline-list{
  display:flex; flex-direction:column;
}
.t-item{
  display:grid;
  grid-template-columns: 100px 1fr auto;
  gap: 32px;
  padding: 26px 0;
  border-top: 1px solid var(--paper-line);
  align-items: baseline;
  transition: padding .4s ease;
}
.t-item:last-child{ border-bottom: 1px solid var(--paper-line); }
.t-item:hover{ padding-left: 12px; }
.t-item .yr{
  font-family: var(--serif);
  font-size: 32px; color: var(--copper);
  font-style: italic;
}
.t-item .what{
  font-size: 16.5px; line-height: 1.5;
  color: var(--black);
  max-width: 56ch;
}
.t-item .what strong{ font-weight: 600; }
.t-item .where{
  font-family: var(--mono); font-size: 11px;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--stone-soft);
  white-space: nowrap;
}
@media (max-width: 640px){
  .t-item{ grid-template-columns: 64px 1fr; gap: 16px; }
  .t-item .yr{ font-size: 22px; }
  .t-item .where{ display:none; }
}

/* ---------- Escuela ---------- */
.escuela{ background: var(--black); color: var(--cream); }
.escuela .lead{
  font-family: var(--serif); font-style: italic;
  font-size: clamp(28px, 3.4vw, 44px);
  line-height: 1.2;
  max-width: 24ch;
  margin-bottom: 64px;
  color: var(--cream);
}
.escuela .lead em{ color: var(--copper); font-style: italic; }
.disciples{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
}
@media (max-width: 980px){ .disciples{ grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 580px){ .disciples{ grid-template-columns: repeat(2, 1fr); } }
.disciple{
  display:flex; flex-direction:column; gap:12px;
  cursor: pointer;
}
.disciple .face{
  aspect-ratio: 3/4;
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,.03) 0 2px, transparent 2px 12px),
    linear-gradient(180deg, #2a2317, #0a0805);
  position:relative;
  transition: filter .4s ease;
}
.disciple .face::after{
  content: attr(data-init);
  position:absolute; left:14px; bottom:12px;
  font-family: var(--serif); font-style: italic;
  font-size: 28px; color: var(--copper);
}
.disciple:hover .face{ filter: brightness(1.2); }
.disciple .name{ font-size: 13px; font-weight: 600; }
.disciple .place{ font-size: 11.5px; color: rgba(245,239,230,.55); font-family: var(--mono); letter-spacing: .04em; }

/* ---------- FAQ ---------- */
.faq{ background: var(--cream); }
.faq-list{ max-width: 920px; margin: 0 auto; }
.faq-item{
  border-top: 1px solid var(--paper-line);
}
.faq-item:last-child{ border-bottom: 1px solid var(--paper-line); }
.faq-q{
  display:flex; align-items:center; justify-content:space-between;
  padding: 26px 0;
  cursor: pointer;
  font-family: var(--serif);
  font-size: clamp(20px, 2.2vw, 28px);
  line-height: 1.3;
  gap: 32px;
  transition: color .3s ease;
}
.faq-q:hover{ color: var(--burgundy); }
.faq-q .plus{
  font-family: var(--mono); font-size: 14px;
  color: var(--copper);
  flex:0 0 auto;
  transition: transform .35s ease;
}
.faq-item.open .faq-q .plus{ transform: rotate(45deg); }
.faq-a{
  max-height: 0; overflow: hidden;
  transition: max-height .5s ease;
}
.faq-item.open .faq-a{ max-height: 400px; }
.faq-a-inner{
  padding-bottom: 28px;
  font-size: 16.5px; line-height: 1.65;
  color: var(--stone);
  max-width: 72ch;
}

/* ---------- Contacto ---------- */
.contacto{
  background: var(--black); color: var(--cream);
}
.contact-grid{
  display: grid;
  grid-template-columns: 5fr 7fr;
  gap: clamp(40px, 6vw, 96px);
}
@media (max-width: 880px){ .contact-grid{ grid-template-columns: 1fr; } }
.contact-grid h2{
  font-family: var(--serif);
  font-size: clamp(40px, 5.4vw, 76px);
  line-height: 1;
  margin-bottom: 32px;
}
.contact-grid h2 em{ color: var(--copper); font-style: italic; }
.contact-lead{
  font-family: var(--serif); font-style: italic;
  font-size: 22px; line-height: 1.4;
  color: rgba(245,239,230,.85);
  max-width: 28ch;
  margin-bottom: 40px;
}
.contact-direct{ display:flex; flex-direction:column; gap: 14px; margin-top: 20px; }
.contact-direct .row{
  display:flex; gap: 18px; padding: 14px 0;
  border-top: 1px solid rgba(245,239,230,.15);
  align-items:center;
}
.contact-direct .row:last-child{ border-bottom: 1px solid rgba(245,239,230,.15); }
.contact-direct .lbl{
  font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--copper);
  width: 110px; flex:0 0 auto;
}
.contact-direct .val{ font-family: var(--serif); font-size: 18px; }

.form{
  background: rgba(245,239,230,.04);
  border: 1px solid rgba(245,239,230,.12);
  padding: clamp(32px, 4vw, 48px);
}
.form .row{
  display:grid; grid-template-columns: 1fr 1fr; gap: 20px;
  margin-bottom: 22px;
}
@media (max-width: 640px){ .form .row{ grid-template-columns: 1fr; } }
.form-field{ display:flex; flex-direction:column; gap: 8px; }
.form-field label{
  font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em;
  text-transform: uppercase; color: rgba(245,239,230,.6);
}
.form-field input, .form-field select, .form-field textarea{
  background: transparent;
  border: 0;
  border-bottom: 1px solid rgba(245,239,230,.25);
  color: var(--cream);
  font-family: var(--sans);
  font-size: 16px;
  padding: 10px 0;
  outline: none;
  transition: border-color .3s ease;
  resize: none;
}
.form-field textarea{ min-height: 100px; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus{ border-color: var(--copper); }
.form-field select{ appearance: none; cursor: pointer; }
.form-field select option{ background: var(--black); color: var(--cream); }

.form-check{
  display:flex; gap:12px; align-items:flex-start;
  font-size: 12px; color: rgba(245,239,230,.7);
  margin: 18px 0 28px;
  line-height: 1.5;
}
.form-check input{ margin-top: 3px; accent-color: var(--copper); }
.form-check a{ color: var(--copper); text-decoration: underline; text-underline-offset: 3px; }

.form .submit{
  width:100%;
  background: var(--copper); color: var(--black);
  border: 0; padding: 18px;
  font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: background .3s ease;
  display:flex; align-items:center; justify-content:center; gap: 10px;
}
.form .submit:hover{ background: var(--cream); }
.form .submit.sent{ background: var(--absinthe); color: var(--cream); }

/* ---------- Footer ---------- */
.footer{
  background: var(--black); color: rgba(245,239,230,.6);
  padding: 64px 0 36px;
  border-top: 1px solid rgba(245,239,230,.12);
}
.footer-top{
  display:grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 32px; padding-bottom: 48px;
  border-bottom: 1px solid rgba(245,239,230,.12);
}
@media (max-width: 760px){ .footer-top{ grid-template-columns: 1fr 1fr; } }
.footer .brand{
  font-family: var(--serif);
  font-size: 44px;
  color: var(--cream);
  letter-spacing: -.01em;
  line-height: 1;
}
.footer .tagline{
  font-family: var(--serif); font-style: italic;
  font-size: 17px; max-width: 28ch; margin-top: 14px;
  color: rgba(245,239,230,.7);
}
.footer h4{
  font-family: var(--mono); font-size: 10.5px; letter-spacing: .16em;
  text-transform: uppercase; color: var(--copper);
  margin-bottom: 16px;
}
.footer ul{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px; }
.footer ul a{ font-size: 14px; color: rgba(245,239,230,.7); }
.footer ul a:hover{ color: var(--copper); }
.footer-bot{
  display:flex; justify-content:space-between; align-items:center;
  padding-top: 24px; font-size: 12px; gap: 16px; flex-wrap: wrap;
  font-family: var(--mono); letter-spacing: .04em;
  color: rgba(245,239,230,.45);
}

/* ---------- Drawer (sub-pages) ---------- */
.drawer-overlay{
  position: fixed; inset:0; background: rgba(0,0,0,.6); z-index: 90;
  opacity:0; pointer-events:none;
  transition: opacity .35s ease;
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
}
.drawer-overlay.open{ opacity:1; pointer-events:auto; }
.drawer{
  position: fixed; top:0; right:0; bottom:0;
  width: min(900px, 92vw);
  background: var(--cream); color: var(--black);
  z-index: 91;
  transform: translateX(100%);
  transition: transform .5s cubic-bezier(.2,.7,.2,1);
  overflow-y: auto;
  padding: 44px clamp(28px, 4vw, 56px) 80px;
}
.drawer.open{ transform: translateX(0); }
.drawer-close{
  position: sticky; top: 0; margin-left: auto;
  display:flex; align-items:center; gap:10px;
  background: var(--cream); padding: 10px 14px; border: 1px solid var(--paper-line);
  font-family: var(--mono); font-size: 11px; letter-spacing:.12em;
  text-transform: uppercase; cursor:pointer;
  width: max-content;
}
.drawer h2{
  font-family: var(--serif); font-size: clamp(40px, 5vw, 64px); line-height: 1;
  margin: 24px 0 12px;
}
.drawer .sub{
  font-family: var(--serif); font-style: italic; font-size: 19px;
  color: var(--stone); margin-bottom: 40px;
}
.cocteles-grid{
  display:grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
}
@media (max-width: 720px){ .cocteles-grid{ grid-template-columns: 1fr; } }
.coctel{
  border: 1px solid var(--paper-line); background: #fff;
  display:flex; flex-direction:column;
}
.coctel .img{
  aspect-ratio: 4/5;
  background:
    radial-gradient(circle at 50% 60%, rgba(176,141,87,.35), transparent 55%),
    linear-gradient(170deg, #1a1109, #060403);
  position: relative;
}
.coctel .img .name{
  position:absolute; bottom: 16px; left: 18px;
  font-family: var(--serif); font-style: italic;
  font-size: 22px; color: var(--copper);
}
.coctel .body{ padding: 22px; }
.coctel h3{ font-family: var(--serif); font-size: 26px; margin-bottom: 10px; }
.coctel .ficha{
  font-family: var(--mono); font-size: 11px; color: var(--stone-soft);
  letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px;
}
.coctel p{ font-size: 15px; color: var(--stone); line-height: 1.55; }

.prensa-block{
  display:grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-bottom: 32px;
}
@media (max-width: 720px){ .prensa-block{ grid-template-columns: 1fr; } }
.prensa-card{
  background: #fff; border: 1px solid var(--paper-line);
  padding: 24px; display:flex; flex-direction:column; gap: 10px;
}
.prensa-card .lbl{ font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--copper); }
.prensa-card h3{ font-family: var(--serif); font-size: 22px; }
.prensa-card .download{
  margin-top: auto;
  display:flex; align-items:center; justify-content:space-between;
  padding-top: 14px; border-top: 1px solid var(--paper-line);
  font-family: var(--mono); font-size: 11px; letter-spacing:.1em; text-transform: uppercase;
  color: var(--black);
  cursor: pointer;
}
.prensa-card .download:hover{ color: var(--burgundy); }

/* ---------- Sticky CTA mobile ---------- */
.sticky-cta{
  display:none;
}
@media (max-width: 720px){
  .sticky-cta{
    display:flex; position: fixed; bottom: 0; left:0; right:0;
    z-index: 70;
    background: var(--black); color: var(--cream);
    padding: 14px 16px;
    align-items:center; justify-content:space-between;
    border-top: 1px solid rgba(245,239,230,.15);
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
  }
  .sticky-cta button{
    background: var(--copper); color: var(--black);
    border: 0; padding: 10px 16px;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 500;
    cursor: pointer;
  }
}

/* ---------- Reveal ---------- */
.reveal{ opacity:0; transform: translateY(24px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
.reveal.in{ opacity:1; transform: none; }

/* ---------- Cursor follower ---------- */
.cursor-dot{
  position: fixed; top:0; left:0;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--copper);
  pointer-events: none; z-index: 9999;
  mix-blend-mode: difference;
  transform: translate(-50%, -50%) scale(.6);
  transition: transform .25s ease, opacity .25s ease;
  opacity: 0;
}
.cursor-dot.show{ opacity:1; }
.cursor-dot.hover{ transform: translate(-50%, -50%) scale(2.4); background: var(--cream); }
@media (hover: none){ .cursor-dot{ display:none; } }

</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ------------------------------------------------------------------ */
/* Reveal-on-scroll                                                    */
/* ------------------------------------------------------------------ */
function useReveal(){
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: .12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ------------------------------------------------------------------ */
/* Counter that animates when in view                                  */
/* ------------------------------------------------------------------ */
function Counter({ to, prefix = '', suffix = '', duration = 1600 }){
  const ref = useRef(null);
  const [val, setVal] = useState(0);
  const done = useRef(false);
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && !done.current){
          done.current = true;
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setVal(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: .5 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, [to, duration]);
  return <span ref={ref}>{prefix}{val.toLocaleString('es-ES')}{suffix}</span>;
}

/* ------------------------------------------------------------------ */
/* Cursor follower on CTAs (desktop only)                              */
/* ------------------------------------------------------------------ */
function CursorDot(){
  const ref = useRef(null);
  useEffect(() => {
    if (matchMedia('(hover: none)').matches) return;
    const dot = ref.current;
    let raf;
    const onMove = (e) => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
      });
      dot.classList.add('show');
    };
    const onOver = (e) => {
      const t = e.target.closest('button, a, .f-card .cta, .faq-q, .disciple, .media-tile');
      dot.classList.toggle('hover', !!t);
    };
    const onLeave = () => dot.classList.remove('show');
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseover', onOver);
    window.addEventListener('mouseleave', onLeave);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseover', onOver);
      window.removeEventListener('mouseleave', onLeave);
    };
  }, []);
  return <div ref={ref} className="cursor-dot" />;
}

function CoctelesDrawer({ open, onClose }){

    { name: 'Stick Bloody', ficha: 'Vodka · tomate · especias de la huerta', story: 'La receta con la que su hermana Yoli ganó el Mundial IBA en Turín, 2005. Sigue siendo el clásico de la casa.' },
    { name: 'Diplomisú', ficha: 'Ron Diplomático · café · cacao · finger', story: 'Un cóctel postre. Pensado para cerrar un menú degustación, donde la coctelería hace de cuarta sobremesa.' },
    { name: 'A las 5 en el Astoria', ficha: 'Vermut · té · piel de naranja sanguina', story: 'Cóctel de hora baja, hecho para la sobremesa larga. Inspirado en la liturgia del té británico filtrada por el sol vasco.' },
    { name: 'Mascletá', ficha: 'Gin · pólvora cítrica · espuma de albahaca', story: 'Diseñado para la carta de Estimar Valencia. Estalla en boca: por eso el nombre.' },
    { name: 'Etxeko', ficha: 'Patxaran · cítrico vasco · sidra natural', story: 'Cóctel de casa. Solo se sirve cuando se conoce al cliente.' },
  ];
  return (
    <>
      <div className={"drawer-overlay" + (open ? " open" : "")} onClick={onClose} />

        <button className="drawer-close" onClick={onClose}>← Cerrar</button>
        <div className="num" style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'.1em',color:'var(--copper)',marginTop:24}}>SUB-PÁGINA · /cocteles</div>

        <p className="sub">Selección de cócteles firmados a lo largo de tres décadas. Cada uno con una historia detrás.</p>
        <div className="cocteles-grid">
          {cocteles.map((c,i) => (
            <article key={i} className="coctel">

              <div className="body">
                <h3>{c.name}</h3>
                <div className="ficha">{c.ficha}</div>
                <p>{c.story}</p>

/* ------------------------------------------------------------------ */
/* Sticky CTA mobile                                                    */
/* ------------------------------------------------------------------ */
function StickyCta(){
  return (
    <div className="sticky-cta">
      <span>Patxi Troitiño</span>
      <a href="#contacto"><button>Reservar →</button></a>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* App + Tweaks                                                         */
/* ------------------------------------------------------------------ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "akelarre",
  "displayFont": "Cormorant Garamond",
  "bodyFont": "Inter",
  "heroVariant": "video",
  "ctaPrimaryLabel": "Reservar una formación",
  "showCursorDot": true,
  "darkSections": true
}/*EDITMODE-END*/;

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();
  const [coctelesOpen, setCoctelesOpen] = useState(false);
  const [prensaOpen, setPrensaOpen] = useState(false);
  const [preselect, setPreselect] = useState('');

  // Apply palette
  useEffect(() => {
    const root = document.documentElement;
    if (t.palette === 'akelarre'){
      root.style.setProperty('--cream','#F5EFE6');
      root.style.setProperty('--cream-2','#EDE5D6');
      root.style.setProperty('--copper','#B08D57');
      root.style.setProperty('--burgundy','#5C1A1B');
      root.style.setProperty('--black','#0A0A0A');
    } else if (t.palette === 'donosti'){
      root.style.setProperty('--cream','#F2F0EA');
      root.style.setProperty('--cream-2','#E6E2D6');
      root.style.setProperty('--copper','#7A6A4F');
      root.style.setProperty('--burgundy','#3B5D3B');
      root.style.setProperty('--black','#1A1814');
    } else if (t.palette === 'midnight'){
      root.style.setProperty('--cream','#0F0E0C');
      root.style.setProperty('--cream-2','#1A1814');
      root.style.setProperty('--copper','#C9A567');
      root.style.setProperty('--burgundy','#7A2A2B');
      root.style.setProperty('--black','#F5EFE6');
      document.body.style.color = '#F5EFE6';
    }
    if (t.palette !== 'midnight'){ document.body.style.color = ''; }
  }, [t.palette]);

  // Apply fonts
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--serif', `"${t.displayFont}", Georgia, serif`);
    root.style.setProperty('--sans', `"${t.bodyFont}", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif`);
  }, [t.displayFont, t.bodyFont]);

  const handleSelectFormacion = (type) => {
    setPreselect(type);
    setTimeout(() => {
      document.getElementById('contacto')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };

  return (
    <>
      {t.showCursorDot && <CursorDot />}
      <TopBar />
      <Hero heroVariant={t.heroVariant} />
      <Trust />
      <Manifiesto />
      <Figures />
      <Formaciones onSelect={handleSelectFormacion} />
      <Testimonios />
      <MediaWall onOpenPrensa={() => setPrensaOpen(true)} />
      <Palmares />
      <Escuela />
      <Faq />
      <Contacto preselect={preselect} setPreselect={setPreselect} />
      <Footer />
      <StickyCta />

      <CoctelesDrawer open={coctelesOpen} onClose={() => setCoctelesOpen(false)} />
      <PrensaDrawer open={prensaOpen} onClose={() => setPrensaOpen(false)} />

      {/* hidden trigger for /cocteles via keyboard 'c' or footer */}
      <button
        onClick={() => setCoctelesOpen(true)}
        style={{
          position:'fixed', left: 16, bottom: 16, zIndex: 50,
          background:'var(--black)', color:'var(--copper)',
          border:'1px solid var(--copper)', padding:'10px 14px',
          fontFamily:'var(--mono)', fontSize: 11, letterSpacing:'.14em',
          textTransform:'uppercase', cursor:'pointer'
        }}
      >Ver cócteles →</button>

      <TweaksPanel title="Tweaks · Patxi Troitiño">
        <TweakSection label="Dirección de arte" />
        <TweakRadio label="Paleta" value={t.palette}
          options={[
            {value:'akelarre', label:'Akelarre'},
            {value:'donosti', label:'Donosti'},
            {value:'midnight', label:'Midnight'},
          ]}
          onChange={(v) => setTweak('palette', v)} />
        <TweakSelect label="Tipografía display" value={t.displayFont}
          options={[
            'Cormorant Garamond', 'Playfair Display', 'GT Super Display',
            'EB Garamond', 'Italiana', 'DM Serif Display'
          ]}
          onChange={(v) => setTweak('displayFont', v)} />
        <TweakSelect label="Tipografía body" value={t.bodyFont}
          options={[
            'Inter', 'General Sans', 'IBM Plex Sans', 'Manrope', 'Söhne'
          ]}
          onChange={(v) => setTweak('bodyFont', v)} />

        <TweakSection label="Hero" />
        <TweakText label="CTA primario" value={t.ctaPrimaryLabel}
          onChange={(v) => setTweak('ctaPrimaryLabel', v)} />

        <TweakSection label="Detalles" />
        <TweakToggle label="Cursor follower (desktop)" value={t.showCursorDot}
          onChange={(v) => setTweak('showCursorDot', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
